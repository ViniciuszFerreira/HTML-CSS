<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 25 - 24/05/2024</title>

    <style>
        #div1{
            background-color: red;
            padding: 50px;
            border: 1px solid;
            color: white;
            font-size: 20px;
        }

    </style>

</head>
<body>

    

    <div id="div1">
        <h1>Exemplo 25</h1>
        <h2>O método removeEventListener() remove os manipuladores de eventos que
            foram anexados ao método addEventListener
        </h2>

        <button type="button" id="btn1" onclick="removeEvento()">REMOVER</button>

        <p id="demo"></p>
    </div>


    <script>
       document.getElementById('div1').addEventListener("mousemove",adicEvento);

       function adicEvento(){
        document.getElementById('demo').innerHTML =  Math.random();
       }

       function removeEvento(){
        document.getElementById('div1').removeEventListener('mousemove', adicEvento);
       }



    </script>

</body>
</html>
