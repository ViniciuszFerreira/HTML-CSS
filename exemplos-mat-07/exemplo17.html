    <h1>Exemplo 17</h1>

    <p>
        <label for="nome">Digite seu nome:</label>
        <input type="text" name="nome" id="nome" onfocus="foco(this)">

        function foco(x){
            x.style.backgroundColor = "yellow";
        }
    </script>
